name: Test
on: pull_request
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: quay.io/centos/centos:stream9
    steps:
      - name: Install dependencies
        run: dnf install -y golang make git

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go path
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      - name: Vendor check
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          go mod tidy && go mod vendor && git diff --exit-code

      - name: Build
        run: make build

      - name: Unit tests
        run: make test
  lint:
    runs-on: ubuntu-latest
    container: quay.io/fedora/fedora:latest
    steps:
      - name: Install dependencies
        run: dnf install -y golang make git golangci-lint

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go path
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Format check
        run: |
          diff=$(make format || true)
          if [ -n "$diff" ]; then
            echo "$diff"
            exit 1
          fi

      - name: Lint
        run: make lint
